name: CI

on:
  push:
    branches: 
    - master
  pull_request:
    branches:
    - master

permissions:
  contents: read

env:
  BUILD: ${{github.workspace}}/build
  INSTALL: ${{github.workspace}}/install
  BUILD_TYPE: Release
  PARALLEL: 8

jobs:
  build:
    name: Build (${{matrix.name}})
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Install CMake 4
      run: python -m pip install --upgrade "cmake~=4.0.0"

    - name: Show CMake version
      run: cmake --version

    - name: Configure CMake
      if: runner.os != 'Windows'
      run: cmake -S ${{github.workspace}} -B ${{env.BUILD}} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      if: runner.os != 'Windows'
      run: cmake --build ${{env.BUILD}} --parallel ${{env.PARALLEL}} --config ${{env.BUILD_TYPE}}

    - name: Install with PowerShell wrapper
      if: runner.os == 'Windows'
      shell: pwsh
      run: .\install.ps1 -BuildDir $env:BUILD -BuildType $env:BUILD_TYPE -Prefix $env:INSTALL -Parallel $env:PARALLEL

    - name: Test
      run: ctest --test-dir ${{env.BUILD}} -C ${{env.BUILD_TYPE}} --output-on-failure --parallel ${{env.PARALLEL}}

    - name: Package
      run: cmake --build ${{env.BUILD}} --target package --config ${{env.BUILD_TYPE}}

    - name: Install
      if: runner.os != 'Windows'
      run: cmake --install ${{env.BUILD}} --prefix ${{env.INSTALL}} --config ${{env.BUILD_TYPE}}

    - name: Smoke installed CLI
      if: runner.os != 'Windows'
      run: ${{env.INSTALL}}/bin/smashpp -V

    - name: Smoke installed CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $smashpp = Join-Path $env:INSTALL "bin/smashpp.exe"
        & $smashpp -V

  windows-strict-warnings:
    name: Strict Warnings (Windows)
    runs-on: windows-latest
    env:
      BUILD: ${{github.workspace}}/build-windows-strict
      BUILD_TYPE: Release
      PARALLEL: 8

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Install CMake 4
      run: python -m pip install --upgrade "cmake~=4.0.0"

    - name: Show CMake version
      run: cmake --version

    - name: Configure CMake
      run: cmake -S ${{github.workspace}} -B ${{env.BUILD}} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DSMASHPP_STRICT_WARNINGS=ON

    - name: Build
      run: cmake --build ${{env.BUILD}} --parallel ${{env.PARALLEL}} --config ${{env.BUILD_TYPE}}

    - name: Test
      run: ctest --test-dir ${{env.BUILD}} -C ${{env.BUILD_TYPE}} --output-on-failure --parallel ${{env.PARALLEL}}

  sanitizers:
    name: Sanitizers (Linux)
    runs-on: ubuntu-latest
    env:
      BUILD: ${{github.workspace}}/build-sanitizers
      BUILD_TYPE: RelWithDebInfo
      PARALLEL: 8
      ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Install CMake 4
      run: python -m pip install --upgrade "cmake~=4.0.0"

    - name: Show compiler version
      run: clang++ --version

    - name: Configure CMake
      env:
        CC: clang
        CXX: clang++
      run: >
        cmake -S ${{github.workspace}} -B ${{env.BUILD}}
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -DSMASHPP_ENABLE_OPENMP=OFF
        -DSMASHPP_STRICT_WARNINGS=ON
        -DSMASHPP_ENABLE_SANITIZERS=ON

    - name: Build
      run: cmake --build ${{env.BUILD}} --parallel ${{env.PARALLEL}} --config ${{env.BUILD_TYPE}}

    - name: Test
      run: ctest --test-dir ${{env.BUILD}} -C ${{env.BUILD_TYPE}} --output-on-failure --parallel ${{env.PARALLEL}}
